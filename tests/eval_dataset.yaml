# name: RAG Evaluation Dataset
# description: Reprezentatívne testovacie otázky pre meranie kvality retrieval.
# type: eval-dataset
# version: 1.0
# created: 2026-04-07
# total_questions: 28
#
# Ako funguje tento dataset
#
# Každá otázka má:
#   - query: čo sa pýtame
#   - expected_categories: očakávané kategórie v top-K (aspoň jedna musí match)
#   - expected_keywords: frázy/slová, ktoré by sa mali objaviť v texte aspoň jedného chunku v top-K
#                       (case-insensitive, OR logika — stačí jedna match)
#   - min_score: minimálne skóre najlepšieho výsledku (sanity check)
#   - notes: prečo je otázka v datasete (čo testuje)
#
# Metriky, ktoré harness spočíta:
#   - Category Hit Rate @ K — % otázok, kde aspoň jeden z top-K má očakávanú kategóriu
#   - Keyword Hit Rate @ K — % otázok, kde aspoň jeden z top-K obsahuje očakávané kľúčové slovo
#   - MRR (Mean Reciprocal Rank) — na kategóriách
#   - Priemerné score najlepšieho výsledku

